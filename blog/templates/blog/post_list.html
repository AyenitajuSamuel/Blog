<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>My Blog</h1>
    {% if posts %}
        {% for post in posts %}
            <p><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></p>
        {% endfor %} 
    {% else%}
        <p>No posts yet.</p>  
    {% endif %} 
</body>
</html>
