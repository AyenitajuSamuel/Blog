{% extends 'blog/base.html' %}
{% block content %}
    <h1>My Blog</h1>
    {% if posts %}
        {% for post in posts %}
            <p><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></p>
        {% endfor %} 
    {% else%}
        <p>No posts yet.</p>  
    {% endif %} 
{% endblock %}
